<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atlas x RMP</title>
  <style>
    /* Palette mirrors src/inject.css badge colors so popup feels like the same product. */
    :root {
      --good-bg: #bbf7d0;  --good-fg: #14532d;
      --ok-bg:   #fef9c3;  --ok-fg:   #713f12;
      --bad-bg:  #fee2e2;  --bad-fg:  #7f1d1d;
      --muted:   #6b7280;
      --border:  #e5e7eb;
      --bg:      #ffffff;
      --fg:      #1f2937;
      --accent:  #2563eb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 300px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      line-height: 1.4;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    header img { width: 18px; height: 18px; }
    header h1 {
      font-size: 0.95em;
      margin: 0;
      font-weight: 600;
    }

    .section {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child { border-bottom: none; }

    .pref-row {
      display: flex;
      align-items: center;
      padding: 3px 0;
      cursor: pointer;
    }

    .pref-row label {
      flex: 1;
      cursor: pointer;
    }

    input[type="checkbox"] {
      margin-right: 8px;
    }

    input[type="number"] {
      width: 56px;
      padding: 2px 4px;
      font-size: 0.95em;
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-left: 6px;
    }

    .min-row {
      display: flex;
      align-items: center;
      padding: 3px 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85em;
    }

    .status-row .label { color: var(--muted); }
    .status-row .value-ok   { color: var(--good-fg); }
    .status-row .value-warn { color: var(--bad-fg); cursor: pointer; text-decoration: underline; }
    .status-row .value-default { color: var(--ok-fg); }

    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85em;
    }

    a.action {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-size: 0.85em;
    }

    a.action:hover { text-decoration: underline; }

    .footer {
      padding: 8px 12px;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="" />
    <h1>Atlas x RMP</h1>
  </header>

  <div class="section">
    <div class="pref-row">
      <input type="checkbox" id="pref-hideClosed" />
      <label for="pref-hideClosed">Hide closed sections</label>
    </div>
    <div class="pref-row">
      <input type="checkbox" id="pref-hideEmpty" />
      <label for="pref-hideEmpty">Hide empty cards</label>
    </div>
    <div class="min-row">
      <input type="checkbox" id="pref-minRating" />
      <label for="pref-minRating">Min RMP rating:</label>
      <input type="number" id="pref-minRatingValue" min="0" max="5" step="0.1" value="0" />
    </div>
  </div>

  <div class="section">
    <div class="status-row">
      <span class="label">Token:</span>
      <span id="token-status" class="value-default">checking...</span>
    </div>
    <div class="status-row" style="margin-top: 4px;">
      <span class="label">RMP cache:</span>
      <span>
        <span id="cache-count">0</span> entries &middot;
        <a id="clear-cache" class="action">clear</a>
      </span>
    </div>
  </div>

  <div class="footer">
    <a id="open-options" class="action">Open full Options &rarr;</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
