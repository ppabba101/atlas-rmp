<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atlas x RMP</title>
  <style>
    /* Atlas-style popup. Mimics atlas.ai.umich.edu's card / typography hierarchy
       (no Typekit dep — system-ui only). Atlas eval-card palette is reused for
       status chips so popup feels native to Atlas. */
    @font-face {
      font-family: "Usual";
      src: url("fonts/Usual-Regular.otf") format("opentype");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Usual";
      src: url("fonts/Usual-Italic.otf") format("opentype");
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: "Usual";
      src: url("fonts/Usual-Bold.otf") format("opentype");
      font-weight: 700; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Usual";
      src: url("fonts/Usual-BoldItalic.otf") format("opentype");
      font-weight: 700; font-style: italic; font-display: swap;
    }

    :root {
      --umich-blue:   #00274C;
      --umich-maize:  #FFCB05;
      --pink:         #d32582;
      --green:        #60800c;
      --blue:         #245389;
      --purple:       #8f29ad;
      --orange:       #ba5b00;
      --bg-page:      #f3f4f7;
      --bg-card:      #ffffff;
      --fg:           #000000;
      --fg-muted:     #6b7280;
      --border:       #e5e7eb;
      --shadow:       0 4px 14px #b9c1cc;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 340px;
      font-family: "Usual", Helvetica, Arial, sans-serif;
      background: var(--bg-page);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.42857;
    }

    .wrapper {
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Atlas-inspired card-container — only the corners + shadow are copied;
       margin/padding are tighter than Atlas's site since this is a popup. */
    .card-container {
      background: var(--bg-card);
      border-radius: 8px;
      -webkit-box-shadow: var(--shadow);
      -moz-box-shadow: var(--shadow);
      box-shadow: var(--shadow);
      padding: 12px 16px 14px;
      margin: 8px 12px;
      position: relative;
    }

    a, a:visited { color: #3c6dea; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .text-med {
      font-size: 1em;
      font-weight: 600;
      color: var(--fg);
      margin: 0 0 4px;
    }
    .text-small {
      font-size: 0.85em;
      color: var(--fg-muted);
    }
    .card-description {
      margin: 0 0 10px;
    }

    .pref-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      cursor: pointer;
    }
    .pref-row label { flex: 1; cursor: pointer; }
    .pref-row input[type="checkbox"] { margin-right: 8px; }

    .min-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      gap: 6px;
    }
    .min-row label { flex: 0 0 auto; }

    input[type="number"] {
      width: 56px;
      padding: 3px 5px;
      font-size: 0.95em;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    /* Atlas eval-card-style chips */
    .chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.78em;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .chip-default { background: #fff4d6; color: var(--orange); }
    .chip-ok      { background: #e2efbf; color: var(--green); }
    .chip-warn    { background: #fde2ee; color: var(--pink);
                    cursor: pointer; text-decoration: none; }
    .chip-warn:hover { filter: brightness(0.95); }

    .row {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row + .row { margin-top: 6px; }

    a.action {
      color: #3c6dea;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.85em;
    }
    a.action:hover { text-decoration: underline; }

    .footer {
      text-align: right;
      padding: 4px 2em 1.5em;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header style="display:flex;align-items:center;gap:10px;padding:14px 16px 4px;">
      <img src="../icons/icon48.png" alt="" style="width:42px;height:42px;" />
      <span style="font-weight:700;font-size:1.85em;letter-spacing:0.01em;color:#3c6dea;">Atlas &times; RMP</span>
    </header>
    <div class="card-container">
      <h3 class="text-med">Token status</h3>
      <p class="text-small card-description">RMP authorization header used for lookups.</p>
      <div class="row">
        <span class="text-small">Status</span>
        <span id="token-status" class="chip chip-default">checking...</span>
      </div>
    </div>

    <div class="card-container">
      <h3 class="text-med">Display filters</h3>
      <p class="text-small card-description">Hide noisy rows, focus on what matters.</p>
      <div class="pref-row">
        <input type="checkbox" id="pref-hideClosed" />
        <label for="pref-hideClosed">Hide closed sections</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="pref-hideWait" />
        <label for="pref-hideWait">Hide wait-list sections</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="pref-hideEmpty" />
        <label for="pref-hideEmpty">Hide cards with no instructors</label>
      </div>
      <div class="min-row">
        <input type="checkbox" id="pref-minRating" />
        <label for="pref-minRating">Min RMP rating:</label>
        <input type="number" id="pref-minRatingValue" min="0" max="5" step="0.1" value="0" />
      </div>
    </div>

    <div class="card-container">
      <h3 class="text-med">Active on</h3>
      <p class="text-small card-description">Choose which pages get RMP badges.</p>
      <div class="pref-row">
        <input type="checkbox" id="page-courseDetail" />
        <label for="page-courseDetail">Course detail</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="page-instructorProfile" />
        <label for="page-instructorProfile">Instructor profile</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="page-dashboard" />
        <label for="page-dashboard">Dashboard</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="page-searchResults" />
        <label for="page-searchResults">Browse Courses</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="page-scheduleBuilder" />
        <label for="page-scheduleBuilder">Schedule Builder</label>
      </div>
      <div class="pref-row">
        <input type="checkbox" id="page-courseGuide" />
        <label for="page-courseGuide">LSA Course Guide</label>
      </div>
    </div>

    <div class="card-container">
      <h3 class="text-med">Cache</h3>
      <p class="text-small card-description">Local RMP lookups cached for speed.</p>
      <div class="row">
        <span class="text-small"><span id="cache-count">0</span> entries</span>
        <a id="clear-cache" class="action">Clear cache</a>
      </div>
    </div>

    <div class="footer">
      <a id="open-options" class="action">Open full Options &rarr;</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
